# LDR Coach — full stack. `docker compose up --build` runs everything:
# Postgres, FastAPI backend (auto-migrated), Next.js frontend, and an
# Nginx reverse proxy that is the single public entrypoint on :80.
#
# All configuration comes from the repo-root .env (copy from .env.example).

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ldr

  backend:
    build: ./backend
    environment:
      ENV: ${ENV:-production}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-1440}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ldr

  # Long-running reminder worker: polls for due reminders (visits, rituals)
  # and writes in-app notifications. Shares the backend image and config but
  # runs outside the request/response cycle. The backend applies migrations on
  # startup; the worker tolerates a not-yet-migrated DB and retries.
  worker:
    build: ./backend
    command: ["python", "-m", "app.worker"]
    environment:
      ENV: ${ENV:-production}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      NOTIFICATIONS_POLL_SECONDS: ${NOTIFICATIONS_POLL_SECONDS:-60}
      VISIT_REMINDER_DEFAULT_DAYS: ${VISIT_REMINDER_DEFAULT_DAYS:-3}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ldr

  frontend:
    build: ./frontend
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - ldr

  reverse-proxy:
    build: ./infra/nginx
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - backend
      - frontend
    networks:
      - ldr

volumes:
  db_data:

networks:
  ldr:
    driver: bridge
